[workspace]
name = "fdp"
channels = ["ga-fdp", "conda-forge"]
platforms = ["linux-64"]

[dependencies]
python = ">=3.11,<3.13"
xrdcl-pelican-fdp = "*"
pelicanplatform = ">=7.24.3,<8"
setuptools = "*"
pip = "*"
versioneer = "*"
# Dev-env-only: toksearch isn't a release run-dep (decoupling is the
# point of the split), but `fdp chat` / `fdp query` execvpe into
# toksearch.llm.cli, so it must be present in this checkout's pixi env
# to test those subcommands locally. End users who install fdp via
# conda also need toksearch in their env to use chat/query.
toksearch = ">=2.7.3"
# Phase 1 catalog migration: fdp.catalog loads tokamak YAMLs validated
# by fdp-schema. Available on the ga-fdp channel.
fdp-schema = ">=0.1.2"

[tasks]
build = "pip install -e . --no-deps"
test = { cmd = "cd tests && ./testit", depends-on = ["build"] }

[pypi-dependencies]
fdp = { path = ".", editable = true }
